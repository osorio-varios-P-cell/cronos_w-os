name: CRONOS OS Headless CI

on:
  push:
    branches: [ main, feature/**, evolve/** ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 nasm mtools ovmf python3-pip git curl
          pip3 install FATtools --break-system-packages
          rustup toolchain install nightly
          rustup default nightly
          rustup target add x86_64-unknown-none
          # Descargar binarios de Limine para el arranque UEFI
          mkdir -p limine-tools/limine-binary
          git clone https://github.com/limine-bootloader/limine.git --branch=v5.x-binary --depth=1 limine-tools-repo
          cp limine-tools-repo/BOOTX64.EFI limine-tools/limine-binary/
          cp limine-tools-repo/limine-bios.sys limine-tools/limine-binary/ || true

      - name: Build Kernel
        run: make kernel

      - name: Create Disk Image
        run: make image

      - name: Run QEMU Headless and Capture Logs
        run: |
          # Run QEMU with UEFI support and capture serial output
          timeout 60s qemu-system-x86_64 \
            -bios /usr/share/ovmf/OVMF.fd \
            -drive format=raw,file=cronos_w-os.img \
            -m 2G \
            -display none \
            -serial file:qemu_serial_report.log \
            -no-reboot || true

          echo "--- QEMU SERIAL REPORT ---"
          cat qemu_serial_report.log

          # Check for PANIC in logs
          if grep -q "PANIC" qemu_serial_report.log; then
            echo "❌ Critical Error: Kernel Panic detected!"
            exit 1
          fi

          if grep -q "FALLIDO" qemu_serial_report.log; then
            echo "⚠️ Warning: System init reported failure."
            exit 1
          fi

      - name: Upload Logs
        uses: actions/upload-artifact@v4
        with:
          name: qemu-reports
          path: qemu_serial_report.log
