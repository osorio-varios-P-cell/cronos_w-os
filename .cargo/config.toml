# ── Build configuration for bare-metal x86_64 target ──────────────────────────
[build]
target = "x86_64-unknown-none"

[target.x86_64-unknown-none]
rustflags = [
    "-C", "link-arg=-Tlinker.ld",
    "-C", "relocation-model=static",
    "-C", "link-arg=-static",
    "-C", "link-arg=-z", "-C", "link-arg=max-page-size=0x1000",
    "-C", "link-arg=-no-pie",
    "-C", "link-arg=--gc-sections",
]
