# Limine Bootloader Configuration for CRONOS OS
# Modern v5+ key: value syntax

timeout: 1
verbose: yes
serial: yes
serial_baud: 115200
serial_data: 8
serial_parity: n
serial_stop: 1

# Framebuffer configuration
framebuffer: yes
framebuffer_width: 1024
framebuffer_height: 768
framebuffer_bpp: 32

# CRONOS OS Entry
/CRONOS OS
    protocol: limine
    path: boot():/CRONOS
    cmdline: console=ttyS0,115200n8

# Fallback entry
/FALLBACK
    protocol: limine
    path: boot():/CRONOS
    cmdline: console=ttyS0,115200n8 debug
