# Limine Bootloader Configuration for CRONOS OS
# Modern v5+ key: value syntax

timeout: 1
verbose: yes
serial: yes

# Configuración de Framebuffer
framebuffer: yes
framebuffer_width: 1024
framebuffer_height: 768
framebuffer_bpp: 32

# Entrada principal: CRONOS OS
/CRONOS OS
    protocol: limine
    path: boot():/CRONOS
    cmdline: console=ttyS0,115200n8
    kaslr: no
    base_revision: 2

# Entrada de recuperación: FALLBACK
/FALLBACK
    protocol: limine
    path: boot():/CRONOS
    cmdline: console=ttyS0,115200n8 debug
