# Limine Bootloader Configuration for CRONOS OS
# Modern v5+ key: value syntax

timeout: 1
verbose: yes
serial: yes
serial_baud: 115200
serial_data: 8
serial_parity: n
serial_stop: 1

# CRONOS OS Entry
/CRONOS OS
    protocol: limine
    path: boot():/cronos_w_os
    cmdline: console=ttyS0,115200n8
    kaslr: no
    base_revision: 2

# Fallback entry
/FALLBACK
    protocol: limine
    path: boot():/cronos_w_os
    cmdline: console=ttyS0,115200n8 debug
