# Limine Bootloader Configuration for CRONOS OS
# Exokernel with Graphs Architecture

TIMEOUT=1
VERBOSE=yes
SERIAL=yes
SERIAL_BAUD=115200
SERIAL_DATA=8
SERIAL_PARITY=N
SERIAL_STOP=1

# Framebuffer configuration
FRAMEBUFFER=yes
FRAMEBUFFER_WIDTH=1024
FRAMEBUFFER_HEIGHT=768
FRAMEBUFFER_BPP=32

# Default entry
DEFAULT_ENTRY=CRONOS_OS

# CRONOS OS Entry
:CRONOS_OS
    PROTOCOL=limine
    KERNEL_PATH=boot:///cronos_w_os
    KERNEL_CMDLINE=console=ttyS0,115200n8

# Fallback entry
:FALLBACK
    PROTOCOL=limine
    KERNEL_PATH=boot:///cronos_w_os
    KERNEL_CMDLINE=console=ttyS0,115200n8 debug
